<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>questions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <p id="category-display"></p>
        <h1 id="display-area">ready to start?</h1>
        <button id="main-button" onclick="shownewquestion()">show me a question</button>
    </div>

    <script src="questions.js"></script>
    <script>
        function shownewquestion() {
            const display = document.getElementById('display-area');
            const categoryDisplay = document.getElementById('category-display');
            const btn = document.getElementById('main-button');
            
            // random selection
            const randomindex = Math.floor(Math.random() * questionbank.length);
            const selected = questionbank[randomindex];
            
            // update screen
            display.innerText = selected.Text;
            categoryDisplay.innerText = selected.Category;
            btn.innerText = "show me another one";
        }
    </script>
</body>
</html>
